<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>明居置业 · 找到理想家</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A96E; --gold-light: #E8D5B0; --dark: #1A1A1A; --mid: #3D3D3D;
    --soft: #6B6B6B; --bg: #F8F5F0; --white: #FFFFFF; --card: #FDFAF6; --border: #E8E0D4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; overflow-x: hidden; }

  /* NAV */
  .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(26,26,26,0.96); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 56px; }
  .nav-logo { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 700; color: var(--gold); letter-spacing: 2px; }
  .nav-logo span { color: var(--white); font-weight: 400; }
  .nav-tabs { display: flex; }
  .nav-tab { padding: 8px 14px; font-size: 13px; color: rgba(255,255,255,0.6); cursor: pointer; border-bottom: 2px solid transparent; }
  .nav-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* SCREENS */
  .screen { display: none; padding-top: 56px; min-height: 100vh; }
  .screen.active { display: block; }

  /* HERO */
  .hero { background: linear-gradient(160deg, #1A1A1A 0%, #2C2416 60%, #3D2E12 100%); padding: 48px 24px 40px; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; top: -60px; right: -60px; width: 220px; height: 220px; border-radius: 50%; background: radial-gradient(circle, rgba(201,169,110,0.15) 0%, transparent 70%); }
  .hero-tag { display: inline-block; background: rgba(201,169,110,0.15); border: 1px solid rgba(201,169,110,0.3); color: var(--gold); font-size: 11px; letter-spacing: 3px; padding: 4px 12px; border-radius: 20px; margin-bottom: 16px; }
  .hero h1 { font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 700; color: var(--white); line-height: 1.4; margin-bottom: 10px; }
  .hero h1 em { color: var(--gold); font-style: normal; }
  .hero p { font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.8; margin-bottom: 24px; }
  .hero-stats { display: flex; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
  .stat { flex: 1; text-align: center; border-right: 1px solid rgba(255,255,255,0.1); }
  .stat:last-child { border-right: none; }
  .stat-num { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 700; color: var(--gold); }
  .stat-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }

  /* FILTER */
  .filter-bar { padding: 16px 20px 8px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--white); font-size: 12px; color: var(--soft); cursor: pointer; font-family: 'Noto Sans SC', sans-serif; }
  .filter-btn.active { background: var(--dark); color: var(--gold); border-color: var(--dark); }

  .section-header { padding: 20px 20px 12px; display: flex; align-items: baseline; justify-content: space-between; }
  .section-title { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 700; }
  .section-sub { font-size: 12px; color: var(--soft); }

  .loading-state { padding: 60px 20px; text-align: center; }
  .loading-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--soft); }
  .error-state { padding: 40px 20px; text-align: center; }
  .error-icon { font-size: 40px; margin-bottom: 12px; }
  .error-text { font-size: 13px; color: var(--soft); line-height: 1.8; }

  /* PROPERTY CARDS */
  .properties { padding: 0 16px 24px; display: flex; flex-direction: column; gap: 16px; }
  .prop-card { background: var(--card); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.06); cursor: pointer; animation: fadeUp 0.4s ease both; }
  .prop-card:active { transform: scale(0.98); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  /* 列表页封面图（只展示第一张） */
  .prop-cover { width: 100%; height: 200px; position: relative; overflow: hidden; background: #eee; }
  .prop-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .prop-cover-placeholder { width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; font-size: 56px; }
  .prop-badge { position: absolute; top: 12px; left: 12px; font-size: 10px; letter-spacing: 1px; padding: 4px 10px; border-radius: 4px; font-weight: 500; z-index: 2; }
  .badge-sale { background: #3D1A0D; color: #E07B54; }
  .badge-rent { background: #1B4332; color: #52B788; }
  .badge-new  { background: #1A1A1A; color: #C9A96E; }
  /* 图片数量角标 */
  .photo-count { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.55); color: #fff; font-size: 11px; padding: 3px 8px; border-radius: 10px; display: flex; align-items: center; gap: 4px; }

  .prop-body { padding: 16px; }
  .prop-title { font-family: 'Noto Serif SC', serif; font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .prop-address { font-size: 12px; color: var(--soft); margin-bottom: 12px; }
  .prop-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .prop-tag { background: rgba(201,169,110,0.1); border: 1px solid rgba(201,169,110,0.25); color: #8B6914; font-size: 11px; padding: 3px 10px; border-radius: 4px; }
  .prop-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 12px; }
  .prop-price { font-size: 20px; font-weight: 700; color: #C0392B; font-family: 'Noto Serif SC', serif; }
  .prop-price span { font-size: 12px; font-weight: 400; color: var(--soft); }
  .prop-area { font-size: 12px; color: var(--soft); }

  /* ===== 详情页轮播 ===== */
  .detail-header { position: fixed; top: 0; left: 0; right: 0; z-index: 200; display: flex; align-items: center; background: rgba(26,26,26,0.96); height: 56px; padding: 0 16px; gap: 12px; }
  .back-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 50%; cursor: pointer; font-size: 20px; color: var(--white); flex-shrink: 0; }
  .detail-header-title { font-size: 15px; color: var(--white); font-family: 'Noto Serif SC', serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* 轮播容器 */
  .carousel { width: 100%; height: 260px; position: relative; overflow: hidden; background: #222; touch-action: pan-y; }
  .carousel-track { display: flex; height: 100%; transition: transform 0.35s ease; will-change: transform; }
  .carousel-slide { flex-shrink: 0; width: 100%; height: 100%; }
  .carousel-slide img { width: 100%; height: 100%; object-fit: cover; display: block; user-select: none; -webkit-user-drag: none; }
  .carousel-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 72px; }

  /* 轮播指示点 */
  .carousel-dots { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
  .carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4); transition: all 0.2s; cursor: pointer; }
  .carousel-dot.active { background: var(--white); width: 18px; border-radius: 3px; }

  /* 左右箭头（图片多于1张时显示） */
  .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 36px; height: 36px; background: rgba(0,0,0,0.35); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 18px; border: none; z-index: 10; }
  .carousel-btn.prev { left: 10px; }
  .carousel-btn.next { right: 10px; }
  .carousel-counter { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.5); color: #fff; font-size: 12px; padding: 3px 10px; border-radius: 10px; }

  .detail-content { padding: 20px; }
  .detail-title { font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .detail-price { font-size: 26px; font-weight: 700; color: #C0392B; margin-bottom: 16px; }
  .detail-price span { font-size: 14px; font-weight: 400; color: var(--soft); }
  .detail-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .info-item { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
  .info-label { font-size: 11px; color: var(--soft); margin-bottom: 4px; }
  .info-value { font-size: 14px; font-weight: 500; }
  .detail-section { margin-bottom: 20px; }
  .detail-section-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid var(--gold-light); font-family: 'Noto Serif SC', serif; }
  .detail-desc { font-size: 13px; color: var(--mid); line-height: 2; }
  .detail-features { display: flex; flex-wrap: wrap; gap: 8px; }
  .detail-feature { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; font-size: 12px; color: var(--mid); }
  .detail-cta { margin-top: 20px; display: flex; gap: 10px; }
  .btn-primary { flex: 1; padding: 14px; background: var(--dark); color: var(--gold); border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans SC', sans-serif; letter-spacing: 1px; }
  .btn-secondary { flex: 1; padding: 14px; background: var(--white); color: var(--dark); border: 1px solid var(--border); border-radius: 10px; font-size: 14px; cursor: pointer; font-family: 'Noto Sans SC', sans-serif; }

  /* CONTACT */
  .contact-hero { background: linear-gradient(160deg, #1A1A1A 0%, #2C2416 100%); padding: 40px 24px 32px; }
  .contact-hero h2 { font-family: 'Noto Serif SC', serif; font-size: 24px; color: var(--white); margin-bottom: 8px; }
  .contact-hero p { font-size: 13px; color: rgba(255,255,255,0.5); }
  .contact-cards { padding: 20px 16px; display: flex; flex-direction: column; gap: 12px; }
  .contact-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; display: flex; align-items: center; gap: 16px; text-decoration: none; }
  .contact-card:active { transform: scale(0.97); }
  .contact-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; background: #F0F0F0; }
  .contact-info { flex: 1; }
  .contact-label { font-size: 11px; color: var(--soft); margin-bottom: 4px; }
  .contact-value { font-size: 15px; font-weight: 500; }
  .contact-arrow { font-size: 18px; color: var(--soft); }

  /* BOTTOM NAV */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: rgba(26,26,26,0.97); backdrop-filter: blur(12px); display: flex; height: 60px; border-top: 1px solid rgba(255,255,255,0.08); }
  .bnav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; gap: 3px; }
  .bnav-icon { font-size: 20px; line-height: 1; }
  .bnav-label { font-size: 10px; color: rgba(255,255,255,0.4); }
  .bnav-item.active .bnav-label { color: var(--gold); }
  .pb-nav { padding-bottom: 70px; }
</style>
</head>

<script>
// ============================================================
// ★ 把下面换成你的 Google Apps Script 部署网址
// ============================================================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbys9ruWVge4OeIDXRe9bvKBVa5Wb1WGdRq6SzMr0DsR6tSIM2f_qMbp1Cz-6-jKJ-wF/exec";

// ---- 以下不需要修改 ----
let allProperties = [];

async function loadData() {
  if (SCRIPT_URL === "YOUR_APPS_SCRIPT_URL") { loadDemoData(); return; }
  try {
    const res = await fetch(`${SCRIPT_URL}?action=getAll`);
    const data = await res.json();
    allProperties = (data.properties || []).map((p, i) => ({ ...p, _index: i }));
    renderFilters();
    renderCards('全部');
  } catch (e) {
    document.getElementById('prop-list').innerHTML = `
      <div class="error-state">
        <div class="error-icon">⚠️</div>
        <div class="error-text">数据加载失败，请检查 SCRIPT_URL<br><small>${e.message}</small></div>
      </div>`;
  }
}

function renderFilters() {
  const types = ['全部', ...new Set(allProperties.map(p => p.type).filter(Boolean))];
  const rooms = [...new Set(allProperties.map(p => p.rooms).filter(Boolean))];
  document.getElementById('filter-bar').innerHTML = [...types, ...rooms].map((f, i) =>
    `<button class="filter-btn ${i===0?'active':''}" onclick="filterProps(this,'${f}')">${f}</button>`
  ).join('');
}

const emojiColors = ['linear-gradient(135deg,#667eea,#764ba2)','linear-gradient(135deg,#11998e,#38ef7d)','linear-gradient(135deg,#f7971e,#ffd200)','linear-gradient(135deg,#f093fb,#f5576c)','linear-gradient(135deg,#4facfe,#00f2fe)','linear-gradient(135deg,#43e97b,#38f9d7)'];
const emojis = ['🏙️','🌿','🌃','🌸','🏡','🏢'];

function badgeClass(type) {
  if (!type) return 'badge-sale';
  if (type.includes('租')) return 'badge-rent';
  if (type.includes('新')) return 'badge-new';
  return 'badge-sale';
}

function renderCards(filter) {
  const list = filter === '全部' ? allProperties : allProperties.filter(p => p.type === filter || p.rooms === filter);
  document.getElementById('prop-count').textContent = `共 ${list.length} 套`;
  if (!list.length) {
    document.getElementById('prop-list').innerHTML = `<div class="error-state"><div class="error-icon">🔍</div><div class="error-text">暂无符合条件的房源</div></div>`;
    return;
  }
  document.getElementById('prop-list').innerHTML = `<div class="properties">${list.map((p, i) => {
    const color = emojiColors[i % emojiColors.length];
    const emoji = emojis[i % emojis.length];
    const images = p.images || [];
    const coverHtml = images.length > 0
      ? `<img src="${images[0]}" alt="${p.title}" onerror="this.parentNode.innerHTML='<div class=prop-cover-placeholder style=background:${color}>${emoji}</div>'">`
      : `<div class="prop-cover-placeholder" style="background:${color}">${emoji}</div>`;
    const photoCountHtml = images.length > 1
      ? `<div class="photo-count">📷 ${images.length}</div>` : '';
    const tags = p.tags ? p.tags.split('，').map(t=>`<span class="prop-tag">${t.trim()}</span>`).join('') : '';
    return `
      <div class="prop-card" style="animation-delay:${i*0.07}s" onclick="showDetail(${p._index})">
        <div class="prop-cover">
          ${coverHtml}
          <div class="prop-badge ${badgeClass(p.type)}">${p.type||'出售'}</div>
          ${photoCountHtml}
        </div>
        <div class="prop-body">
          <div class="prop-title">${p.title}</div>
          <div class="prop-address">📍 ${p.address||''}</div>
          <div class="prop-tags">${tags}</div>
          <div class="prop-footer">
            <div class="prop-price">${p.price}<span> ${p.priceUnit||''}</span></div>
            <div class="prop-area">建面 ${p.area||''}</div>
          </div>
        </div>
      </div>`;
  }).join('')}</div>`;
}

function filterProps(btn, filter) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(filter);
}

// ===== 轮播逻辑 =====
let carouselIndex = 0;
let carouselImages = [];
let touchStartX = 0;
let touchStartY = 0;

function buildCarousel(images, color, emoji) {
  if (!images || images.length === 0) {
    return `<div class="carousel"><div class="carousel-placeholder" style="background:${color}">${emoji}</div></div>`;
  }
  const slides = images.map(url =>
    `<div class="carousel-slide"><img src="${url}" draggable="false" onerror="this.parentNode.style.background='${color}';this.outerHTML='<span style=font-size:56px>${emoji}</span>'"></div>`
  ).join('');
  const dots = images.length > 1
    ? `<div class="carousel-dots">${images.map((_, i) => `<div class="carousel-dot ${i===0?'active':''}" onclick="goToSlide(${i})"></div>`).join('')}</div>`
    : '';
  const arrows = images.length > 1
    ? `<button class="carousel-btn prev" onclick="carouselPrev()">‹</button>
       <button class="carousel-btn next" onclick="carouselNext()">›</button>
       <div class="carousel-counter">1 / ${images.length}</div>`
    : '';
  return `
    <div class="carousel" id="carousel" ontouchstart="onTouchStart(event)" ontouchend="onTouchEnd(event)">
      <div class="carousel-track" id="carouselTrack">${slides}</div>
      ${dots}${arrows}
    </div>`;
}

function goToSlide(index) {
  carouselIndex = Math.max(0, Math.min(index, carouselImages.length - 1));
  const track = document.getElementById('carouselTrack');
  if (track) track.style.transform = `translateX(-${carouselIndex * 100}%)`;
  document.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === carouselIndex));
  const counter = document.querySelector('.carousel-counter');
  if (counter) counter.textContent = `${carouselIndex + 1} / ${carouselImages.length}`;
}

function carouselPrev() { goToSlide(carouselIndex - 1); }
function carouselNext() { goToSlide(carouselIndex + 1); }

function onTouchStart(e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}
function onTouchEnd(e) {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    dx < 0 ? carouselNext() : carouselPrev();
  }
}

function showDetail(index) {
  const p = allProperties[index];
  const color = emojiColors[index % emojiColors.length];
  const emoji = emojis[index % emojis.length];
  carouselImages = p.images || [];
  carouselIndex = 0;

  document.getElementById('detail-nav-title').textContent = p.title;
  const features = p.features ? p.features.split('，').map(f=>`<span class="detail-feature">${f.trim()}</span>`).join('') : '';

  document.getElementById('detail-body').innerHTML = `
    ${buildCarousel(carouselImages, color, emoji)}
    <div class="detail-content">
      <div class="prop-badge ${badgeClass(p.type)}" style="display:inline-block;margin-bottom:10px">${p.type||'出售'}</div>
      <div class="detail-title">${p.title}</div>
      <div class="detail-price">${p.price}<span> ${p.priceUnit||''}</span></div>
      <div class="detail-info-grid">
        <div class="info-item"><div class="info-label">建筑面积</div><div class="info-value">${p.area||'—'}</div></div>
        <div class="info-item"><div class="info-label">楼层</div><div class="info-value">${p.floor||'—'}</div></div>
        <div class="info-item"><div class="info-label">建成年份</div><div class="info-value">${p.year||'—'}</div></div>
        <div class="info-item"><div class="info-label">朝向</div><div class="info-value">${p.orientation||'—'}</div></div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">房源描述</div>
        <div class="detail-desc">${p.desc||'暂无描述'}</div>
      </div>
      ${features ? `<div class="detail-section"><div class="detail-section-title">配套设施</div><div class="detail-features">${features}</div></div>` : ''}
      <div class="detail-cta">
        <button class="btn-primary" onclick="showTab('contact')">📞 立即咨询</button>
        <button class="btn-secondary" onclick="backToList()">← 返回列表</button>
      </div>
    </div>`;

  document.getElementById('screen-detail').style.display = 'block';
  document.getElementById('screen-home').style.display = 'none';
  document.getElementById('mainNav').style.display = 'none';
  document.querySelector('.bottom-nav').style.display = 'none';
  window.scrollTo(0, 0);
}

function backToList() {
  document.getElementById('screen-detail').style.display = 'none';
  document.getElementById('screen-home').style.display = 'block';
  document.getElementById('mainNav').style.display = 'flex';
  document.querySelector('.bottom-nav').style.display = 'flex';
}

function showTab(tab) {
  ['home','contact'].forEach(t => {
    document.getElementById('screen-'+t).classList.remove('active');
    document.getElementById('bnav-'+t)?.classList.remove('active');
  });
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  document.getElementById('bnav-'+tab)?.classList.add('active');
  document.querySelectorAll('.nav-tab')[tab==='home'?0:1]?.classList.add('active');
  window.scrollTo(0, 0);
}

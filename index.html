<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>明居置業 · 找到理想家</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A96E; --gold-light: #E8D5B0; --gold-dark: #A88B4A;
    --dark: #1A1A1A; --mid: #3D3D3D; --soft: #6B6B6B;
    --bg: #F5F5F5; --white: #FFFFFF; --card: #FFFFFF;
    --border: #E5E5E5; --red: #D32F2F; --red-hover: #B71C1C;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; overflow-x: hidden; }

  /* ===== NAVBAR ===== */
  .navbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: var(--white); display: flex; align-items: center;
    justify-content: space-between; padding: 0 16px; height: 54px;
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .nav-left { display: flex; align-items: center; gap: 16px; }
  .nav-logo {
    font-family: 'Noto Serif SC', serif; font-size: 17px; font-weight: 700;
    color: var(--red); letter-spacing: 0.5px; white-space: nowrap; flex-shrink: 0;
  }
  .nav-logo span { color: var(--dark); font-weight: 600; }
  .nav-links { display: none; align-items: center; gap: 4px; }
  .nav-link {
    padding: 6px 10px; font-size: 13px; color: var(--dark); cursor: pointer;
    white-space: nowrap; border-radius: 6px; transition: background 0.15s;
    font-weight: 500;
  }
  .nav-link:hover { background: #f0f0f0; }
  .nav-link.active { color: var(--red); }
  .nav-right { display: flex; align-items: center; gap: 6px; }
  .lang-switcher {
    display: flex; background: #f0f0f0; border-radius: 20px;
    padding: 3px; gap: 2px;
  }
  .lang-btn {
    padding: 4px 10px; border-radius: 14px; font-size: 11px;
    color: var(--soft); cursor: pointer; transition: all 0.2s;
    white-space: nowrap; border: none; background: none;
    font-family: 'Noto Sans SC', sans-serif; font-weight: 500;
  }
  .lang-btn.active { background: var(--dark); color: var(--white); }

  @media (min-width: 768px) {
    .nav-links { display: flex; }
    .navbar { padding: 0 32px; }
  }

  /* ===== SCREENS ===== */
  .screen { display: none; padding-top: 54px; min-height: 100vh; }
  .screen.active { display: block; }

  /* ===== HERO ===== */
  .hero {
    position: relative; width: 100%; min-height: 420px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 48px 20px 56px;
    background: linear-gradient(180deg, rgba(20,20,20,0.35) 0%, rgba(20,20,20,0.55) 100%),
      url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=1400&q=80') center/cover no-repeat;
    text-align: center; overflow: hidden;
  }
  .hero::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
    background: linear-gradient(transparent, rgba(0,0,0,0.3));
    pointer-events: none;
  }
  .hero-headline {
    font-family: 'Noto Serif SC', serif; font-size: 32px; font-weight: 900;
    color: #fff; line-height: 1.35; margin-bottom: 6px;
    text-shadow: 0 2px 16px rgba(0,0,0,0.3);
    max-width: 600px;
  }
  .hero-headline em { font-style: normal; }
  .hero-sub {
    font-size: 14px; color: rgba(255,255,255,0.75); margin-bottom: 28px;
    max-width: 480px; line-height: 1.7;
  }

  @media (min-width: 768px) {
    .hero { min-height: 480px; padding: 64px 32px 72px; }
    .hero-headline { font-size: 44px; }
  }

  /* ===== HERO FILTER TABS ===== */
  .hero-tabs {
    display: flex; align-items: center; justify-content: center;
    gap: 0; margin-bottom: 16px; position: relative; z-index: 2;
  }
  .hero-tab {
    padding: 8px 16px; font-size: 13px; color: rgba(255,255,255,0.7);
    cursor: pointer; position: relative; transition: color 0.2s;
    font-weight: 500; white-space: nowrap; border: none; background: none;
    font-family: 'Noto Sans SC', sans-serif;
  }
  .hero-tab.active { color: #fff; }
  .hero-tab.active::after {
    content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 28px; height: 3px; background: var(--white); border-radius: 2px;
  }

  /* ===== SEARCH BAR ===== */
  .search-wrap {
    position: relative; z-index: 2; width: 100%; max-width: 640px;
    display: flex; align-items: center;
    background: var(--white); border-radius: 40px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18); overflow: hidden;
    padding: 5px 5px 5px 20px;
  }
  .search-input {
    flex: 1; border: none; outline: none; font-size: 14px;
    color: var(--dark); padding: 10px 0;
    font-family: 'Noto Sans SC', sans-serif; background: transparent;
    min-width: 0;
  }
  .search-input::placeholder { color: #aaa; }
  .search-btn {
    flex-shrink: 0; display: flex; align-items: center; gap: 6px;
    padding: 10px 22px; background: var(--red); color: #fff;
    border: none; border-radius: 32px; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: 'Noto Sans SC', sans-serif;
    transition: background 0.2s;
  }
  .search-btn:hover { background: var(--red-hover); }
  .search-btn svg { width: 16px; height: 16px; fill: #fff; }

  /* ===== STATS BAR ===== */
  .stats-bar {
    display: flex; justify-content: center; gap: 0;
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 16px 0;
  }
  .stat {
    flex: 0 0 auto; text-align: center; padding: 0 24px;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }
  .stat-num {
    font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 700;
    color: var(--dark);
  }
  .stat-label { font-size: 11px; color: var(--soft); margin-top: 2px; }

  /* ===== FILTER BAR ===== */
  .filter-bar {
    padding: 14px 16px 6px; display: flex; gap: 8px;
    overflow-x: auto; scrollbar-width: none;
    max-width: 960px; margin: 0 auto;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0; padding: 7px 18px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--white);
    font-size: 12px; color: var(--soft); cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: #ccc; }
  .filter-btn.active {
    background: var(--dark); color: #fff; border-color: var(--dark);
  }

  /* ===== SECTION ===== */
  .section-header {
    padding: 18px 16px 10px; display: flex; align-items: baseline;
    justify-content: space-between; max-width: 960px; margin: 0 auto;
  }
  .section-title { font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 700; }
  .section-sub { font-size: 12px; color: var(--soft); }

  /* ===== LOADING / ERROR ===== */
  .loading-state { padding: 60px 20px; text-align: center; }
  .loading-spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--red); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--soft); }
  .error-state { padding: 40px 20px; text-align: center; }
  .error-icon { font-size: 40px; margin-bottom: 12px; }
  .error-text { font-size: 13px; color: var(--soft); line-height: 1.8; }

  /* ===== PROPERTY CARDS ===== */
  .properties {
    padding: 0 16px 32px; display: grid; gap: 20px;
    max-width: 960px; margin: 0 auto;
    grid-template-columns: 1fr;
  }
  @media (min-width: 640px) { .properties { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 960px) { .properties { grid-template-columns: 1fr 1fr 1fr; } }

  .prop-card {
    background: var(--card); border-radius: 12px; overflow: hidden;
    border: 1px solid var(--border); cursor: pointer;
    animation: fadeUp 0.4s ease both;
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .prop-card:hover { box-shadow: 0 8px 28px rgba(0,0,0,0.1); transform: translateY(-2px); }
  .prop-card:active { transform: scale(0.98); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

  .prop-cover {
    width: 100%; height: 200px; position: relative;
    overflow: hidden; background: #eee;
  }
  .prop-cover img { width:100%; height:100%; object-fit:cover; display:block; transition: transform 0.3s; }
  .prop-card:hover .prop-cover img { transform: scale(1.04); }
  .prop-cover-placeholder {
    width:100%; height:200px; display:flex; align-items:center;
    justify-content:center; font-size:56px;
  }
  .prop-badge {
    position: absolute; top: 10px; left: 10px; font-size: 10px;
    letter-spacing: 1px; padding: 4px 10px; border-radius: 4px;
    font-weight: 600; z-index: 2;
  }
  .badge-sale { background: rgba(211,47,47,0.9); color: #fff; }
  .badge-rent { background: rgba(27,67,50,0.9); color: #52B788; }
  .badge-new  { background: rgba(26,26,26,0.85); color: var(--gold); }
  .photo-count {
    position: absolute; bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.55); color: #fff; font-size: 11px;
    padding: 3px 8px; border-radius: 10px; display: flex;
    align-items: center; gap: 4px;
  }
  .prop-body { padding: 14px 16px 16px; }
  .prop-price {
    font-size: 20px; font-weight: 700; color: var(--red);
    font-family: 'Noto Serif SC', serif; margin-bottom: 4px;
  }
  .prop-price span { font-size: 12px; font-weight: 400; color: var(--soft); }
  .prop-title {
    font-family: 'Noto Serif SC', serif; font-size: 15px;
    font-weight: 600; margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .prop-address { font-size: 12px; color: var(--soft); margin-bottom: 10px; }
  .prop-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 0; }
  .prop-tag {
    background: #f5f5f5; border: 1px solid #e8e8e8;
    color: var(--mid); font-size: 11px; padding: 2px 8px; border-radius: 4px;
  }

  /* ===== DETAIL PAGE ===== */
  .detail-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    display: flex; align-items: center; background: var(--white);
    height: 54px; padding: 0 16px; gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .back-btn {
    width: 36px; height: 36px; display: flex; align-items: center;
    justify-content: center; background: #f0f0f0; border-radius: 50%;
    cursor: pointer; font-size: 20px; color: var(--dark); flex-shrink: 0;
    transition: background 0.15s;
  }
  .back-btn:hover { background: #e0e0e0; }
  .detail-header-title {
    font-size: 15px; color: var(--dark); font-family: 'Noto Serif SC', serif;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600;
  }

  .carousel { width:100%; height:280px; position:relative; overflow:hidden; background:#222; touch-action:pan-y; }
  .carousel-track { display:flex; height:100%; transition:transform 0.35s ease; will-change:transform; }
  .carousel-slide { flex-shrink:0; width:100%; height:100%; }
  .carousel-slide img { width:100%; height:100%; object-fit:cover; display:block; user-select:none; -webkit-user-drag:none; }
  .carousel-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:72px; }
  .carousel-dots { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); display:flex; gap:6px; }
  .carousel-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.4); transition:all 0.2s; cursor:pointer; }
  .carousel-dot.active { background:var(--white); width:18px; border-radius:3px; }
  .carousel-btn { position:absolute; top:50%; transform:translateY(-50%); width:36px; height:36px; background:rgba(0,0,0,0.35); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; color:#fff; font-size:18px; border:none; z-index:10; }
  .carousel-btn.prev { left:10px; }
  .carousel-btn.next { right:10px; }
  .carousel-counter { position:absolute; top:12px; right:12px; background:rgba(0,0,0,0.5); color:#fff; font-size:12px; padding:3px 10px; border-radius:10px; }

  .detail-content { padding: 20px; max-width: 720px; margin: 0 auto; }
  .detail-title { font-family:'Noto Serif SC',serif; font-size:20px; font-weight:700; margin-bottom:6px; }
  .detail-price { font-size:26px; font-weight:700; color:var(--red); margin-bottom:16px; font-family:'Noto Serif SC',serif; }
  .detail-price span { font-size:14px; font-weight:400; color:var(--soft); }
  .detail-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
  .info-item { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px; }
  .info-label { font-size:11px; color:var(--soft); margin-bottom:4px; }
  .info-value { font-size:14px; font-weight:500; }
  .detail-section { margin-bottom:20px; }
  .detail-section-title {
    font-size:14px; font-weight:600; margin-bottom:10px;
    padding-bottom:6px; border-bottom:2px solid var(--red);
    font-family:'Noto Serif SC',serif; display: inline-block;
  }
  .detail-desc { font-size:13px; color:var(--mid); line-height:2; }
  .detail-features { display:flex; flex-wrap:wrap; gap:8px; }
  .detail-feature { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:6px 12px; font-size:12px; color:var(--mid); }
  .detail-cta { margin-top:20px; display:flex; gap:10px; }
  .btn-primary {
    flex:1; padding:14px; background:var(--red); color:#fff;
    border:none; border-radius:10px; font-size:14px; font-weight:600;
    cursor:pointer; font-family:'Noto Sans SC',sans-serif;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: var(--red-hover); }
  .btn-secondary {
    flex:1; padding:14px; background:var(--white); color:var(--dark);
    border:1px solid var(--border); border-radius:10px; font-size:14px;
    cursor:pointer; font-family:'Noto Sans SC',sans-serif;
    transition: background 0.15s;
  }
  .btn-secondary:hover { background: #f5f5f5; }

  /* ===== CONTACT ===== */
  .contact-hero {
    background: linear-gradient(160deg, var(--dark) 0%, #2C2416 100%);
    padding: 40px 24px 32px;
  }
  .contact-hero h2 { font-family:'Noto Serif SC',serif; font-size:24px; color:var(--white); margin-bottom:8px; }
  .contact-hero p { font-size:13px; color:rgba(255,255,255,0.5); }
  .contact-cards { padding:20px 16px; display:flex; flex-direction:column; gap:12px; max-width: 640px; margin: 0 auto; }
  .contact-card {
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:18px; display:flex; align-items:center; gap:16px;
    text-decoration:none; color: var(--dark); transition: box-shadow 0.2s;
  }
  .contact-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .contact-icon {
    width:48px; height:48px; border-radius:12px; display:flex;
    align-items:center; justify-content:center; font-size:22px;
    flex-shrink:0; background:#f5f5f5;
  }
  .contact-info { flex:1; }
  .contact-label { font-size:11px; color:var(--soft); margin-bottom:4px; }
  .contact-value { font-size:15px; font-weight:500; }
  .contact-arrow { font-size:18px; color:var(--soft); }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--white); display: flex; height: 58px;
    border-top: 1px solid var(--border);
    box-shadow: 0 -1px 8px rgba(0,0,0,0.05);
  }
  .bnav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; cursor: pointer; gap: 3px;
  }
  .bnav-icon { font-size: 20px; line-height: 1; }
  .bnav-label { font-size: 10px; color: var(--soft); }
  .bnav-item.active .bnav-icon { filter: none; }
  .bnav-item.active .bnav-label { color: var(--red); font-weight: 600; }
  .pb-nav { padding-bottom: 68px; }

  @media (min-width: 768px) {
    .bottom-nav { display: none; }
    .pb-nav { padding-bottom: 0; }
  }
</style>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar" id="mainNav">
  <div class="nav-left">
    <div class="nav-logo" id="nav-logo">明居<span>置業</span></div>
    <div class="nav-links">
      <div class="nav-link active" id="nav-tab-home" onclick="showTab('home')">房源</div>
      <div class="nav-link" id="nav-tab-contact" onclick="showTab('contact')">聯絡我們</div>
    </div>
  </div>
  <div class="nav-right">
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('tw')">繁</button>
      <button class="lang-btn" onclick="setLang('cn')">简</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
  </div>
</nav>

<!-- ===== HOME ===== -->
<div class="screen active pb-nav" id="screen-home">

  <!-- HERO -->
  <div class="hero">
    <h1 class="hero-headline" id="hero-title">在這裡找到<br><em>您的理想居所</em></h1>
    <p class="hero-sub" id="hero-desc">精選優質房源，專業顧問一對一服務，讓您的置業之路更簡單、更放心。</p>

    <!-- Tabs -->
    <div class="hero-tabs" id="hero-tabs">
      <button class="hero-tab active" data-filter="ALL" onclick="heroFilter(this,'ALL')">全部</button>
    </div>

    <!-- Search Bar -->
    <div class="search-wrap">
      <input class="search-input" id="searchInput" type="text" placeholder="搜尋地區、樓盤名稱…" oninput="onSearch()" />
      <button class="search-btn" onclick="onSearch()">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <span id="search-btn-text">搜尋</span>
      </button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat"><div class="stat-num">200+</div><div class="stat-label" id="stat1-label">在售房源</div></div>
    <div class="stat"><div class="stat-num">8</div><div class="stat-label" id="stat2-label">年從業經驗</div></div>
    <div class="stat"><div class="stat-num">98%</div><div class="stat-label" id="stat3-label">客戶好評</div></div>
  </div>

  <!-- FILTER + LISTINGS -->
  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-filter="ALL" onclick="filterProps(this,'ALL')">全部</button>
  </div>

  <div class="section-header">
    <div class="section-title" id="section-title">精選房源</div>
    <div class="section-sub" id="prop-count">載入中...</div>
  </div>

  <div id="prop-list">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <div class="loading-text">正在載入房源...</div>
    </div>
  </div>
</div>

<!-- ===== CONTACT ===== -->
<div class="screen pb-nav" id="screen-contact">
  <div class="contact-hero">
    <h2 id="contact-title">聯絡我們</h2>
    <p id="contact-sub">專業顧問隨時為您解答，期待與您合作</p>
  </div>
  <div class="contact-cards">
    <a class="contact-card" href="tel:97839116">
      <div class="contact-icon">📞</div>
      <div class="contact-info">
        <div class="contact-label" id="label-phone">電話（WhatsApp同號）</div>
        <div class="contact-value">（852）9783 9116</div>
      </div>
      <div class="contact-arrow">›</div>
    </a>
    <a class="contact-card" href="#" onclick="alert('WeChat: sandyhuitd'); return false;">
      <div class="contact-icon">💬</div>
      <div class="contact-info">
        <div class="contact-label" id="label-wechat">微信</div>
        <div class="contact-value">sandyhuitd</div>
      </div>
      <div class="contact-arrow">›</div>
    </a>
    <a class="contact-card" href="mailto:luminaproperties@yahoo.com">
      <div class="contact-icon">✉️</div>
      <div class="contact-info">
        <div class="contact-label">Email</div>
        <div class="contact-value">luminaproperties@yahoo.com</div>
      </div>
      <div class="contact-arrow">›</div>
    </a>
    <a class="contact-card" href="https://maps.google.com/?q=香港堅尼地城西祥街2號寶翠閣" target="_blank">
      <div class="contact-icon">📍</div>
      <div class="contact-info">
        <div class="contact-label" id="label-address">地址</div>
        <div class="contact-value" id="address-value">香港堅尼地城西祥街2號寶翠閣A座地鋪4C</div>
      </div>
      <div class="contact-arrow">›</div>
    </a>
  </div>
</div>

<!-- ===== DETAIL ===== -->
<div class="screen pb-nav" id="screen-detail">
  <div class="detail-header">
    <div class="back-btn" onclick="backToList()">‹</div>
    <div class="detail-header-title" id="detail-nav-title"></div>
  </div>
  <div id="detail-body" style="padding-top:0;"></div>
</div>

<!-- ===== BOTTOM NAV ===== -->
<div class="bottom-nav">
  <div class="bnav-item active" id="bnav-home" onclick="showTab('home')">
    <div class="bnav-icon">🏠</div>
    <div class="bnav-label" id="bnav-label-home">房源</div>
  </div>
  <div class="bnav-item" id="bnav-contact" onclick="showTab('contact')">
    <div class="bnav-icon">📞</div>
    <div class="bnav-label" id="bnav-label-contact">聯絡我們</div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://lingering-shadow-322d.xliueu.workers.dev";

// ============================================================
// i18n
// ============================================================
const i18n = {
  tw: {
    logo:['明居','置業'], title:'明居置業 · 找到理想家',
    nav_home:'房源', nav_contact:'聯絡我們',
    hero_title:'在這裡找到<br><em>您的理想居所</em>',
    hero_desc:'精選優質房源，專業顧問一對一服務，讓您的置業之路更簡單、更放心。',
    stat1:'在售房源', stat2:'年從業經驗', stat3:'客戶好評',
    section:'精選房源', count: n=>`共 ${n} 套`, filter_all:'全部',
    search_placeholder:'搜尋地區、樓盤名稱…', search_btn:'搜尋',
    contact_title:'聯絡我們', contact_sub:'專業顧問隨時為您解答，期待與您合作',
    label_phone:'電話（WhatsApp同號）', label_wechat:'微信', label_address:'地址',
    address:'香港堅尼地城西祥街2號寶翠閣A座地鋪4C',
    detail_area:'建築面積', detail_floor:'樓層', detail_year:'建成年份', detail_orient:'朝向',
    detail_desc:'房源描述', detail_feat:'配套設施',
    btn_enquire:'📞 立即查詢', btn_back:'← 返回列表',
    no_data:'暫無符合條件的房源', err:'資料載入失敗，請檢查設定',
  },
  cn: {
    logo:['明居','置业'], title:'明居置业 · 找到理想家',
    nav_home:'房源', nav_contact:'联系我们',
    hero_title:'在这里找到<br><em>您的理想居所</em>',
    hero_desc:'精选优质房源，专业顾问一对一服务，让您的置业之路更简单、更放心。',
    stat1:'在售房源', stat2:'年从业经验', stat3:'客户好评',
    section:'精选房源', count: n=>`共 ${n} 套`, filter_all:'全部',
    search_placeholder:'搜索地区、楼盘名称…', search_btn:'搜索',
    contact_title:'联系我们', contact_sub:'专业顾问随时为您解答，期待与您合作',
    label_phone:'电话（WhatsApp同号）', label_wechat:'微信', label_address:'地址',
    address:'香港坚尼地城西祥街2号宝翠阁A座地铺4C',
    detail_area:'建筑面积', detail_floor:'楼层', detail_year:'建成年份', detail_orient:'朝向',
    detail_desc:'房源描述', detail_feat:'配套设施',
    btn_enquire:'📞 立即咨询', btn_back:'← 返回列表',
    no_data:'暂无符合条件的房源', err:'数据加载失败，请检查设置',
  },
  en: {
    logo:['Lumina',' Properties'], title:'Lumina Properties · Your Dream Home',
    nav_home:'Listings', nav_contact:'Contact',
    hero_title:'Find Your<br><em>Dream Home Here</em>',
    hero_desc:'Curated quality listings with dedicated one-on-one advisor service — making your property journey simple and stress-free.',
    stat1:'Listings', stat2:'Yrs Experience', stat3:'Client Satisfaction',
    section:'Featured Listings', count: n=>`${n} listing${n!==1?'s':''}`, filter_all:'All',
    search_placeholder:'Search area, property name…', search_btn:'Search',
    contact_title:'Contact Us', contact_sub:'Our advisors are ready to help.',
    label_phone:'Phone (WhatsApp)', label_wechat:'WeChat', label_address:'Office Address',
    address:'Shop 4C, Block A, Bel-Air On The Peak, 2 Sai Cheung St, Kennedy Town, HK',
    detail_area:'Floor Area', detail_floor:'Floor', detail_year:'Year Built', detail_orient:'Orientation',
    detail_desc:'Description', detail_feat:'Amenities',
    btn_enquire:'📞 Enquire Now', btn_back:'← Back to Listings',
    no_data:'No listings found.', err:'Failed to load data.',
  },
};

let currentLang = 'tw';
let allProperties = [];
let carouselIndex = 0;
let carouselImages = [];
let touchStartX = 0;
let touchStartY = 0;
let currentFilter = 'ALL';

// ============================================================
// Language
// ============================================================
function setLang(lang) {
  currentLang = lang;
  const t = i18n[lang];
  document.querySelectorAll('.lang-btn').forEach((btn,i)=>{
    btn.classList.toggle('active',['tw','cn','en'][i]===lang);
  });
  document.title = t.title;
  document.getElementById('nav-logo').innerHTML = `${t.logo[0]}<span>${t.logo[1]}</span>`;
  document.getElementById('nav-tab-home').textContent = t.nav_home;
  document.getElementById('nav-tab-contact').textContent = t.nav_contact;
  document.getElementById('hero-title').innerHTML = t.hero_title;
  document.getElementById('hero-desc').textContent = t.hero_desc;
  document.getElementById('stat1-label').textContent = t.stat1;
  document.getElementById('stat2-label').textContent = t.stat2;
  document.getElementById('stat3-label').textContent = t.stat3;
  document.getElementById('section-title').textContent = t.section;
  document.getElementById('contact-title').textContent = t.contact_title;
  document.getElementById('contact-sub').textContent = t.contact_sub;
  document.getElementById('label-phone').textContent = t.label_phone;
  document.getElementById('label-wechat').textContent = t.label_wechat;
  document.getElementById('label-address').textContent = t.label_address;
  document.getElementById('address-value').textContent = t.address;
  document.getElementById('bnav-label-home').textContent = t.nav_home;
  document.getElementById('bnav-label-contact').textContent = t.nav_contact;
  document.getElementById('searchInput').placeholder = t.search_placeholder;
  document.getElementById('search-btn-text').textContent = t.search_btn;
  renderHeroTabs(currentFilter);
  renderFilters(currentFilter);
  renderCards(currentFilter);
}

// ============================================================
// Data
// ============================================================
async function loadData() {
  try {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    allProperties = (data.properties || []).map((p,i) => ({...p, _index:i}));
    renderHeroTabs('ALL');
    renderFilters('ALL');
    renderCards('ALL');
  } catch(e) {
    document.getElementById('prop-list').innerHTML = `
      <div class="error-state">
        <div class="error-icon">⚠️</div>
        <div class="error-text">${i18n[currentLang].err}<br><small>${e.message}</small></div>
      </div>`;
  }
}

// ============================================================
// Hero Tabs
// ============================================================
function renderHeroTabs(activeFilter) {
  const t = i18n[currentLang];
  const types = [...new Set(allProperties.map(p=>p.type).filter(Boolean))];
  const html = [
    `<button class="hero-tab ${activeFilter==='ALL'?'active':''}" data-filter="ALL" onclick="heroFilter(this,'ALL')">${t.filter_all}</button>`,
    ...types.map(f=>`<button class="hero-tab ${activeFilter===f?'active':''}" data-filter="${f}" onclick="heroFilter(this,'${f}')">${f}</button>`)
  ];
  document.getElementById('hero-tabs').innerHTML = html.join('');
}

function heroFilter(btn, filter) {
  currentFilter = filter;
  document.querySelectorAll('.hero-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // sync filter bar
  renderFilters(filter);
  renderCards(filter);
}

// ============================================================
// Search
// ============================================================
function onSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const t = i18n[currentLang];
  let list = currentFilter === 'ALL' ? allProperties : allProperties.filter(p => p.type===currentFilter || p.rooms===currentFilter);
  if (q) {
    list = list.filter(p =>
      (p.title||'').toLowerCase().includes(q) ||
      (p.address||'').toLowerCase().includes(q) ||
      (p.tags||'').toLowerCase().includes(q) ||
      (p.desc||'').toLowerCase().includes(q)
    );
  }
  document.getElementById('prop-count').textContent = t.count(list.length);
  renderCardList(list);
}

// ============================================================
// Filters
// ============================================================
function renderFilters(activeFilter) {
  const t = i18n[currentLang];
  const types = [...new Set(allProperties.map(p=>p.type).filter(Boolean))];
  const rooms = [...new Set(allProperties.map(p=>p.rooms).filter(Boolean))];
  const all = [
    `<button class="filter-btn ${activeFilter==='ALL'?'active':''}" data-filter="ALL" onclick="filterProps(this,'ALL')">${t.filter_all}</button>`,
    ...types.map(f=>`<button class="filter-btn ${activeFilter===f?'active':''}" data-filter="${f}" onclick="filterProps(this,'${f}')">${f}</button>`),
    ...rooms.map(f=>`<button class="filter-btn ${activeFilter===f?'active':''}" data-filter="${f}" onclick="filterProps(this,'${f}')">${f}</button>`),
  ];
  document.getElementById('filter-bar').innerHTML = all.join('');
}

// ============================================================
// Cards
// ============================================================
const emojiColors = ['linear-gradient(135deg,#667eea,#764ba2)','linear-gradient(135deg,#11998e,#38ef7d)','linear-gradient(135deg,#f7971e,#ffd200)','linear-gradient(135deg,#f093fb,#f5576c)','linear-gradient(135deg,#4facfe,#00f2fe)','linear-gradient(135deg,#43e97b,#38f9d7)'];
const emojis = ['🏙️','🌿','🌃','🌸','🏡','🏢'];

function badgeClass(type) {
  if (!type) return 'badge-sale';
  if (type.includes('租') || type.toLowerCase().includes('rent')) return 'badge-rent';
  if (type.includes('新') || type.toLowerCase().includes('new')) return 'badge-new';
  return 'badge-sale';
}

function renderCards(filter) {
  currentFilter = filter;
  const t = i18n[currentLang];
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let list = filter === 'ALL' ? allProperties : allProperties.filter(p => p.type===filter || p.rooms===filter);
  if (q) {
    list = list.filter(p =>
      (p.title||'').toLowerCase().includes(q) ||
      (p.address||'').toLowerCase().includes(q) ||
      (p.tags||'').toLowerCase().includes(q) ||
      (p.desc||'').toLowerCase().includes(q)
    );
  }
  document.getElementById('prop-count').textContent = t.count(list.length);
  renderCardList(list);
}

function renderCardList(list) {
  const t = i18n[currentLang];
  if (!list.length) {
    document.getElementById('prop-list').innerHTML = `<div class="error-state"><div class="error-icon">🔍</div><div class="error-text">${t.no_data}</div></div>`;
    return;
  }
  document.getElementById('prop-list').innerHTML = `<div class="properties">${list.map((p,i)=>{
    const color = emojiColors[i % emojiColors.length];
    const emoji = emojis[i % emojis.length];
    const images = p.images || [];
    const cover = images.length > 0
      ? `<img src="${images[0]}" alt="${p.title}" onerror="this.parentNode.innerHTML='<div class=prop-cover-placeholder style=background:${color}>${emoji}</div>'">`
      : `<div class="prop-cover-placeholder" style="background:${color}">${emoji}</div>`;
    const photoTag = images.length > 1 ? `<div class="photo-count">📷 ${images.length}</div>` : '';
    const tags = p.tags ? p.tags.split('，').map(tag=>`<span class="prop-tag">${tag.trim()}</span>`).join('') : '';
    return `
      <div class="prop-card" style="animation-delay:${i*0.06}s" onclick="showDetail(${p._index})">
        <div class="prop-cover">${cover}<div class="prop-badge ${badgeClass(p.type)}">${p.type||''}</div>${photoTag}</div>
        <div class="prop-body">
          <div class="prop-price">${p.price}<span> ${p.priceUnit||''}</span></div>
          <div class="prop-title">${p.title}</div>
          <div class="prop-address">📍 ${p.address||''}</div>
          <div class="prop-tags">${tags}</div>
        </div>
      </div>`;
  }).join('')}</div>`;
}

function filterProps(btn, filter) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // sync hero tabs
  document.querySelectorAll('.hero-tab').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('data-filter')===filter);
  });
  renderCards(filter);
}

// ============================================================
// Carousel
// ============================================================
function buildCarousel(images, color, emoji) {
  if (!images || images.length === 0) {
    return `<div class="carousel"><div class="carousel-placeholder" style="background:${color}">${emoji}</div></div>`;
  }
  const slides = images.map(url=>
    `<div class="carousel-slide"><img src="${url}" draggable="false" onerror="this.parentNode.style.background='${color}';this.outerHTML='<span style=font-size:56px>${emoji}</span>'"></div>`
  ).join('');
  const dots = images.length > 1 ? `<div class="carousel-dots">${images.map((_,i)=>`<div class="carousel-dot ${i===0?'active':''}" onclick="goToSlide(${i})"></div>`).join('')}</div>` : '';
  const arrows = images.length > 1
    ? `<button class="carousel-btn prev" onclick="carouselPrev()">‹</button><button class="carousel-btn next" onclick="carouselNext()">›</button><div class="carousel-counter">1 / ${images.length}</div>` : '';
  return `<div class="carousel" id="carousel" ontouchstart="onTouchStart(event)" ontouchend="onTouchEnd(event)"><div class="carousel-track" id="carouselTrack">${slides}</div>${dots}${arrows}</div>`;
}
function goToSlide(index) {
  carouselIndex = Math.max(0, Math.min(index, carouselImages.length-1));
  const track = document.getElementById('carouselTrack');
  if (track) track.style.transform = `translateX(-${carouselIndex*100}%)`;
  document.querySelectorAll('.carousel-dot').forEach((d,i)=>d.classList.toggle('active',i===carouselIndex));
  const counter = document.querySelector('.carousel-counter');
  if (counter) counter.textContent = `${carouselIndex+1} / ${carouselImages.length}`;
}
function carouselPrev() { goToSlide(carouselIndex-1); }
function carouselNext() { goToSlide(carouselIndex+1); }
function onTouchStart(e) { touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; }
function onTouchEnd(e) {
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){dx<0?carouselNext():carouselPrev();}
}

// ============================================================
// Detail
// ============================================================
function showDetail(index) {
  const p = allProperties[index];
  const t = i18n[currentLang];
  const color = emojiColors[index%emojiColors.length];
  const emoji = emojis[index%emojis.length];
  carouselImages = p.images || [];
  carouselIndex = 0;
  document.getElementById('detail-nav-title').textContent = p.title;
  const features = p.features ? p.features.split('，').map(f=>`<span class="detail-feature">${f.trim()}</span>`).join('') : '';
  document.getElementById('detail-body').innerHTML = `
    ${buildCarousel(carouselImages, color, emoji)}
    <div class="detail-content">
      <div class="prop-badge ${badgeClass(p.type)}" style="display:inline-block;margin-bottom:10px">${p.type||''}</div>
      <div class="detail-title">${p.title}</div>
      <div class="detail-price">${p.price}<span> ${p.priceUnit||''}</span></div>
      <div class="detail-info-grid">
        <div class="info-item"><div class="info-label">${t.detail_area}</div><div class="info-value">${p.area||'—'}</div></div>
        <div class="info-item"><div class="info-label">${t.detail_floor}</div><div class="info-value">${p.floor||'—'}</div></div>
        <div class="info-item"><div class="info-label">${t.detail_year}</div><div class="info-value">${p.year||'—'}</div></div>
        <div class="info-item"><div class="info-label">${t.detail_orient}</div><div class="info-value">${p.orientation||'—'}</div></div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">${t.detail_desc}</div>
        <div class="detail-desc">${p.desc||'—'}</div>
      </div>
      ${features?`<div class="detail-section"><div class="detail-section-title">${t.detail_feat}</div><div class="detail-features">${features}</div></div>`:''}
      <div class="detail-cta">
        <button class="btn-primary" onclick="showTab('contact')">${t.btn_enquire}</button>
        <button class="btn-secondary" onclick="backToList()">${t.btn_back}</button>
      </div>
    </div>`;
  document.getElementById('screen-detail').style.display = 'block';
  document.getElementById('screen-home').style.display = 'none';
  document.getElementById('mainNav').style.display = 'none';
  document.querySelector('.bottom-nav').style.display = 'none';
  window.scrollTo(0,0);
}

function backToList() {
  document.getElementById('screen-detail').style.display = 'none';
  document.getElementById('screen-home').style.display = 'block';
  document.getElementById('mainNav').style.display = 'flex';
  document.querySelector('.bottom-nav').style.display = 'flex';
}

function showTab(tab) {
  ['home','contact'].forEach(t=>{
    document.getElementById('screen-'+t).classList.remove('active');
    document.getElementById('bnav-'+t)?.classList.remove('active');
    document.getElementById('nav-tab-'+t)?.classList.remove('active');
  });
  document.getElementById('screen-'+tab).classList.add('active');
  document.getElementById('bnav-'+tab)?.classList.add('active');
  document.getElementById('nav-tab-'+tab)?.classList.add('active');
  // show navbar again if in detail
  document.getElementById('mainNav').style.display = 'flex';
  document.querySelector('.bottom-nav').style.display = 'flex';
  document.getElementById('screen-detail').style.display = 'none';
  window.scrollTo(0,0);
}

loadData();
</script>
</body>
</html>
